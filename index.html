<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge P2P</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        .connected { background: #10b981; }
        #downloadBtn { display: none; background: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AirBridge</h1>
        <div id="status" class="status-badge">Disconnected</div>
        <div onclick="document.getElementById('fileInput').click()" style="cursor:pointer; padding: 20px; border: 2px dashed #475569; border-radius: 12px; margin: 10px 0;">Select File</div>
        <input type="file" id="fileInput" style="display:none">
        <div id="logArea" style="font-size: 0.9rem; color: #cbd5e1; margin-top: 10px;"></div>
        <button id="downloadBtn">Download File</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        const socket = io("https://airbridge-signaling.onrender.com");
        const peer = new SimplePeer({ initiator: location.hash === '#1', trickle: false });
        
        peer.on('signal', data => socket.emit('signal', data));
        socket.on('signal', data => peer.signal(data));

        peer.on('connect', () => {
            document.getElementById('status').innerText = 'Connected';
            document.getElementById('status').style.background = '#10b981';
        });

        let receivedChunks = [];
        let fileName = "";

        peer.on('data', data => {
            if (data instanceof ArrayBuffer || ArrayBuffer.isView(data)) {
                receivedChunks.push(data);
                document.getElementById('logArea').innerText = "Progress: " + receivedChunks.length + " chunks";
            } else {
                const msg = JSON.parse(new TextDecoder().decode(data));
                if (msg.type === 'start') {
                    receivedChunks = []; fileName = msg.name;
                } else if (msg.type === 'end') {
                    document.getElementById('logArea').innerText = "Transfer Complete!";
                    const btn = document.getElementById('downloadBtn');
                    btn.style.display = "block";
                    btn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(new Blob(receivedChunks));
                        a.download = fileName;
                        a.click();
                    };
                }
            }
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            peer.send(JSON.stringify({ type: 'start', name: file.name }));
            let offset = 0;
            const reader = new FileReader();

            const sendNext = () => {
                const slice = file.slice(offset, offset + 16384);
                reader.readAsArrayBuffer(slice);
            };

            reader.onload = (e) => {
                peer.send(e.target.result);
                offset += e.target.result.byteLength;
                document.getElementById('logArea').innerText = `Sending: ${Math.round((offset/file.size)*100)}%`;
                if (offset < file.size) setTimeout(sendNext, 20);
                else peer.send(JSON.stringify({ type: 'end' }));
            };
            sendNext();
        });
    </script>
</body>
</html>
