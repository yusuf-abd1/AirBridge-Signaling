<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge P2P</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-bottom: 10px; background: #ef4444; }
        .connected { background: #10b981; }
        .drop-zone { border: 2px dashed #475569; padding: 30px; border-radius: 16px; cursor: pointer; margin: 15px 0; }
        progress { width: 100%; height: 20px; border-radius: 10px; overflow: hidden; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AirBridge</h1>
        <div id="status" class="status-badge">Disconnected</div><br>
        <button onclick="copyLink()">Copy Room Link</button>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p>Drag & drop or Click</p>
            <input type="file" id="fileInput" style="display:none">
        </div>
        <progress id="progressBar" value="0" max="100" style="display:none"></progress>
        <div id="logArea"></div>
        <button id="downloadBtn" style="display:none">Download File</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        const roomID = Math.random().toString(36).substring(7);
        const socket = io("https://airbridge-signaling.onrender.com");
        const peer = new SimplePeer({ initiator: location.hash === '#1', trickle: false });
        
        function copyLink() {
            const url = window.location.origin + window.location.pathname + "#" + roomID;
            navigator.clipboard.writeText(url);
            alert("Room link copied! Open this on your other device.");
        }

        peer.on('signal', data => socket.emit('signal', data));
        socket.on('signal', data => peer.signal(data));

        peer.on('connect', () => {
            document.getElementById('status').className = 'status-badge connected';
            document.getElementById('status').innerText = 'Connected';
        });

        // Simplified Sending with Progress Bar
        function handleFile(file) {
            const progressBar = document.getElementById('progressBar');
            progressBar.style.display = "block";
            const encoder = new TextEncoder();
            peer.send(encoder.encode(JSON.stringify({ type: 'start', name: file.name })));
            
            let offset = 0;
            const reader = new FileReader();
            const sendNext = () => reader.readAsArrayBuffer(file.slice(offset, offset + 16384));

            reader.onload = (e) => {
                peer.send(e.target.result);
                offset += e.target.result.byteLength;
                progressBar.value = (offset / file.size) * 100;
                if (offset < file.size) setTimeout(sendNext, 40);
                else peer.send(encoder.encode(JSON.stringify({ type: 'end' })));
            };
            sendNext();
        }

        // ... (Keep existing Drop/Receive logic) ...
        document.getElementById('dropZone').addEventListener('drop', e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
        document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));
        
        // RECEIVE (Condensed)
        let receivedChunks = [];
        peer.on('data', data => {
            if (data[0] === 123) {
                const msg = JSON.parse(new TextDecoder().decode(data));
                if (msg.type === 'end') {
                    document.getElementById('downloadBtn').style.display = "block";
                    document.getElementById('downloadBtn').onclick = () => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(new Blob(receivedChunks));
                        a.download = "downloaded_file"; a.click();
                    };
                }
            } else { receivedChunks.push(data); }
        });
    </script>
</body>
</html>
