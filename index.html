<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge P2P</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-bottom: 20px; background: #ef4444; }
        .connected { background: #10b981; }
        .drop-zone { border: 2px dashed #475569; padding: 40px; border-radius: 16px; cursor: pointer; margin: 20px 0; transition: border 0.3s; }
        .drop-zone:hover { border-color: var(--accent); }
        #progressContainer { width: 100%; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; margin: 15px 0; display: none; }
        #progressBar { height: 100%; width: 0%; background: var(--accent); transition: width 0.2s; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; width: 100%; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AirBridge</h1>
        <div id="status" class="status-badge">Disconnected</div>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p>Drag & drop or Click</p>
            <input type="file" id="fileInput" style="display:none">
        </div>
        <div id="progressContainer"><div id="progressBar"></div></div>
        <div id="logArea" style="font-size: 0.8rem; color: #94a3b8;"></div>
        <button id="downloadBtn">Download File</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        const socket = io("https://airbridge-signaling.onrender.com");
        const peer = new SimplePeer({ initiator: location.hash === '#1', trickle: false });
        
        peer.on('signal', data => socket.emit('signal', data));
        socket.on('signal', data => peer.signal(data));

        peer.on('connect', () => {
            document.getElementById('status').className = 'status-badge connected';
            document.getElementById('status').innerText = 'Connected';
        });

        function handleFile(file) {
            document.getElementById('progressContainer').style.display = "block";
            const progressBar = document.getElementById('progressBar');
            const encoder = new TextEncoder();
            peer.send(encoder.encode(JSON.stringify({ type: 'start', name: file.name })));
            
            let offset = 0;
            const reader = new FileReader();
            const sendNext = () => reader.readAsArrayBuffer(file.slice(offset, offset + 16384));

            reader.onload = (e) => {
                peer.send(e.target.result);
                offset += e.target.result.byteLength;
                progressBar.style.width = ((offset / file.size) * 100) + "%";
                
                if (offset < file.size) setTimeout(sendNext, 40);
                else {
                    peer.send(encoder.encode(JSON.stringify({ type: 'end' })));
                    document.getElementById('logArea').innerText = "Transfer Complete!";
                }
            };
            sendNext();
        }

        let receivedChunks = [];
        let currentFileName = ""; // Global variable to hold the name

        peer.on('data', data => {
            if (data[0] === 123) {
                const msg = JSON.parse(new TextDecoder().decode(data));
                if (msg.type === 'start') {
                    receivedChunks = [];
                    currentFileName = msg.name; // Store the name here
                    document.getElementById('logArea').innerText = "Receiving: " + currentFileName;
                } else if (msg.type === 'end') {
                    const btn = document.getElementById('downloadBtn');
                    btn.style.display = "block";
                    btn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(new Blob(receivedChunks));
                        a.download = currentFileName; // Use the stored name
                        a.click();
                    };
                }
            } else {
                receivedChunks.push(data);
                document.getElementById('logArea').innerText = "Progress: " + receivedChunks.length + " chunks";
            }
        });

        document.getElementById('dropZone').addEventListener('drop', e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
        document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));
        ['dragover', 'dragleave'].forEach(evt => document.getElementById('dropZone').addEventListener(evt, e => e.preventDefault()));
    </script>
</body>
</html>
