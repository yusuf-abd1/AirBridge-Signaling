<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirBridge P2P</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        .connected { background: #10b981; }
        .drop-zone { border: 2px dashed #475569; padding: 40px; border-radius: 16px; cursor: pointer; margin: 20px 0; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AirBridge</h1>
        <div id="status" class="status-badge">Disconnected</div>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p>Click to select file</p>
            <input type="file" id="fileInput" style="display:none">
        </div>
        <div id="logArea"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        const socket = io("https://airbridge-signaling.onrender.com");
        
        // Force binary mode
        const peer = new SimplePeer({ 
            initiator: location.hash === '#1', 
            trickle: false,
            objectMode: false 
        });

        peer.on('signal', data => socket.emit('signal', data));
        socket.on('signal', data => peer.signal(data));

        peer.on('connect', () => {
            document.getElementById('status').className = 'status-badge connected';
            document.getElementById('status').innerText = 'Connected';
        });

        let receivedChunks = [];
        let fileName = "";

        // RECEIVING
        peer.on('data', data => {
            // If data is a string, it's our protocol
            if (typeof data === 'string') {
                const msg = JSON.parse(data);
                if (msg.type === 'start') {
                    receivedChunks = [];
                    fileName = msg.name;
                    document.getElementById('logArea').innerText = "Receiving: " + fileName;
                } else if (msg.type === 'end') {
                    const blob = new Blob(receivedChunks);
                    const btn = document.createElement('button');
                    btn.innerText = "Download " + fileName;
                    btn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = fileName;
                        a.click();
                    };
                    document.querySelector('.card').appendChild(btn);
                    document.getElementById('logArea').innerText = "Transfer complete!";
                }
            } else {
                // If it's binary, push to chunks
                receivedChunks.push(data);
            }
        });

        // SENDING
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            peer.send(JSON.stringify({ type: 'start', name: file.name }));
            
            const reader = new FileReader();
            let offset = 0;
            const chunkSize = 16384;

            const readNext = () => {
                const slice = file.slice(offset, offset + chunkSize);
                reader.readAsArrayBuffer(slice);
            };

            reader.onload = (e) => {
                peer.send(e.target.result);
                offset += e.target.result.byteLength;
                document.getElementById('logArea').innerText = `Sending: ${Math.round((offset/file.size)*100)}%`;
                
                if (offset < file.size) readNext();
                else peer.send(JSON.stringify({ type: 'end', name: file.name }));
            };
            readNext();
        });
    </script>
</body>
</html>
